<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Eurostat Data for Calc logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2f63"/>
      <stop offset="1" stop-color="#122145"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#dc9329"/>
      <stop offset="1" stop-color="#f4bf52"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2f5fd0"/>
      <stop offset="1" stop-color="#5b86f2"/>
    </linearGradient>
  </defs>

  <!-- rounded panel -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>

  <!-- EU-style star crown (top arc) -->
  <g fill="#f4bf52">
    <use href="#star" x="256" y="92"/>
    <use href="#star" x="196" y="104"/>
    <use href="#star" x="316" y="104"/>
    <use href="#star" x="150" y="140"/>
    <use href="#star" x="362" y="140"/>
  </g>
  <symbol id="star" viewBox="-16 -16 32 32" width="26" height="26" x="-13" y="-13" overflow="visible">
    <path d="M0,-13 L3.8,-4 L13.5,-4 L5.7,2.3 L8.6,11.7 L0,6 L-8.6,11.7 L-5.7,2.3 L-13.5,-4 L-3.8,-4 Z"/>
  </symbol>

  <!-- gold corner brackets (data-selection frame) -->
  <g fill="url(#goldBar)">
    <rect x="116" y="196" width="60" height="20" rx="6"/>
    <rect x="116" y="196" width="20" height="60" rx="6"/>
    <rect x="336" y="196" width="60" height="20" rx="6"/>
    <rect x="376" y="196" width="20" height="60" rx="6"/>
    <rect x="116" y="356" width="60" height="20" rx="6"/>
    <rect x="116" y="316" width="20" height="60" rx="6"/>
    <rect x="336" y="356" width="60" height="20" rx="6"/>
    <rect x="376" y="316" width="20" height="60" rx="6"/>
  </g>

  <!-- bar chart -->
  <g>
    <rect x="166" y="300" width="34" height="52" rx="6" fill="url(#goldBar)"/>
    <rect x="212" y="268" width="34" height="84" rx="6" fill="url(#goldBar)"/>
    <rect x="258" y="236" width="34" height="116" rx="6" fill="url(#goldBar)"/>
    <rect x="304" y="200" width="34" height="152" rx="6" fill="url(#blueBar)"/>
  </g>

  <!-- baseline -->
  <rect x="156" y="358" width="200" height="6" rx="3" fill="#f4bf52" opacity="0.35"/>
</svg>
